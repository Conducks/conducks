<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror — Exclusive v3.0</title>
  
  <!-- Core Engines -->
  <script src="https://unpkg.com/d3@7"></script>
  <script src="https://unpkg.com/force-graph"></script>
  
  <!-- Visual DNA -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 🛰️ LOADING -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="text-dim text-xs uppercase tracking-[0.3em] font-light mt-8">Establishing Synapse</div>
  </div>

  <!-- 🕹️ FLOATING DOCK -->
  <nav class="primary-dock">
    <div class="dock-item active" id="dock-graph" title="Graph View">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M3 9V5a2 2 0 0 1 2-2h4"></path><path d="M15 3h4a2 2 0 0 1 2 2v4"></path><path d="M21 15v4a2 2 0 0 1-2 2h-4"></path><path d="M3 15v4a2 2 0 0 0 2 2h4"></path></svg>
    </div>
    <div class="dock-item" id="dock-physics" title="Forces">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
    </div>
    <div class="dock-item" id="dock-trace" title="Trace">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
    </div>
  </nav>

  <!-- 📂 VIEWPORT -->
  <aside id="command-viewport" class="command-viewport custom-scrollbar">
    <!-- DISCOVERY -->
    <div id="slate-discovery" class="slate-active">
      <header class="slate-header">
        <h2 class="uppercase tracking-[0.2em] text-[10px] font-bold text-dim">Discovery</h2>
        <div class="mt-6">
          <input type="text" id="origin-search" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: var(--radius-inner); padding: 14px; color: white; font-size: 13px; outline: none; transition: border-color 0.3s;" placeholder="Filter symbols..." autocomplete="off">
        </div>
      </header>

      <div class="slate-content">
        <section class="glass-card">
          <p class="text-[9px] text-dim uppercase tracking-[0.2em] mb-5 font-bold">Layers</p>
          <div id="layer-filters" class="flex flex-col gap-5"></div>
        </section>

        <section class="glass-card">
          <p class="text-[9px] text-dim uppercase tracking-[0.2em] mb-5 font-bold">Clusters</p>
          <div id="cluster-filters" class="flex flex-col gap-5"></div>
        </section>
      </div>
    </div>

    <!-- FORCES -->
    <div id="slate-physics" style="display: none;">
      <header class="slate-header">
        <div class="flex justify-between items-center">
          <h2 class="uppercase tracking-[0.2em] text-[10px] font-bold text-dim">Forces</h2>
          <button id="btn-reset-physics" class="badge">Reset</button>
        </div>
      </header>
      <div class="slate-content">
         <section class="glass-card">
            <p class="text-[10px] text-dim uppercase font-bold mb-4">Presets</p>
            <div class="flex flex-col gap-2">
              <button class="action-btn-hd text-[10px] bg-white/5 border border-white/10" style="padding: 10px;">Hubs focus</button>
              <button class="action-btn-hd text-[10px] bg-white/5 border border-white/10" style="padding: 10px;">Depth focus</button>
              <button class="action-btn-hd text-[10px] bg-white/5 border border-white/10" style="padding: 10px;">Atomic focus</button>
            </div>
         </section>

         <section class="glass-card">
           <div class="mb-6">
             <div class="flex justify-between items-center mb-1">
               <span class="text-[10px] text-dim uppercase font-bold">Repulsion</span>
               <span id="label-repulsion" class="text-blue font-mono text-[11px]">-2000</span>
             </div>
             <input type="range" id="ctrl-repulsion" class="physics-slider-hd" min="-8000" max="-200" value="-2000">
           </div>
           
           <div class="mb-2">
            <div class="flex justify-between items-center mb-1">
              <span class="text-[10px] text-dim uppercase font-bold">Arena spread</span>
              <span id="label-spread" class="text-blue font-mono text-[11px]">2000</span>
            </div>
            <input type="range" id="ctrl-spread" class="physics-slider-hd" min="500" max="10000" step="100" value="2000">
          </div>
         </section>
      </div>
    </div>

    <!-- TRACE -->
    <div id="slate-trace" style="display: none;">
      <header class="slate-header">
        <h2 class="uppercase tracking-[0.2em] text-[10px] font-bold text-dim">Trace</h2>
      </header>
      <div class="slate-content">
        <section class="glass-card">
          <p class="text-[10px] text-dim mb-4 uppercase tracking-wider font-bold">Direction</p>
          <select id="trace-direction" style="width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: var(--radius-inner); padding: 12px; color: white; font-size: 11px; appearance: none; cursor: pointer;">
            <option value="downstream">Impact flow</option>
            <option value="upstream">Lineage path</option>
            <option value="bidirectional">Full circuit</option>
          </select>
          <button id="btn-clear-isolation" class="action-btn-hd mt-6 bg-white/5 border border-white/10">Clear Filter</button>
        </section>
      </div>
    </div>
  </aside>

  <!-- 🕹️ STATUS METER -->
  <div style="position: absolute; bottom: var(--spacing-air); left: 88px; z-index: 200;">
    <div class="flex items-center gap-3">
       <span id="sync-status" class="badge bg-emerald-500/10 border-emerald-500/20 text-emerald-400">Synced</span>
       <span class="text-[9px] text-white/20 uppercase tracking-[0.3em] font-bold">Apostolic 3.0</span>
    </div>
  </div>

  <!-- 🧊 MAIN GRAPH -->
  <div id="graph-container"></div>
  
  <!-- 🔪 DETAIL PANEL (v3.0.0 Exclusive Glass) -->
  <section id="node-inspector">
    <div class="inspector-hero">
      <div class="flex justify-between items-start">
        <div style="max-width: 80%;">
          <h3 id="ins-name" class="font-bold text-3xl tracking-tighter text-white" style="margin:0; line-height: 1;">Symbol</h3>
          <p id="ins-type" class="text-blue-400 text-[10px] font-light uppercase tracking-[0.3em] mt-4">KIND</p>
        </div>
        <div id="ins-level" class="badge">Layer</div>
      </div>
    </div>
    
    <div class="inspector-body custom-scrollbar">
      <!-- SKELETON -->
      <div class="skeleton-container">
        <div class="skeleton-box w-full h-10 mb-8"></div>
        <div class="grid grid-cols-2 gap-4">
          <div class="skeleton-box w-full h-20"></div>
          <div class="skeleton-box w-full h-20"></div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content-container">
        <div style="padding: var(--spacing-md) 0; border-bottom: 1px solid var(--glass-border);">
          <p class="text-dim text-[9px] uppercase tracking-[0.2em] font-bold mb-2">Structural Location</p>
          <span id="ins-cluster" class="text-blue-400 font-mono text-[11px] truncate block opacity-70">-</span>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mt-8">
          <div class="metric-pill">
            <p class="metric-label">Degree</p>
            <span id="ins-degree" class="metric-value">0</span>
          </div>
          <div class="metric-pill">
            <p class="metric-label">Mass</p>
            <span id="ins-mass" class="metric-value">1.00</span>
          </div>
        </div>

        <div id="ins-meat" class="mt-8 pt-8 opacity-0">
          <p class="text-dim text-[10px] uppercase tracking-[0.2em] font-bold mb-4">Structural Data</p>
          <div class="grid grid-cols-1 gap-3">
            <div class="metric-pill flex-row items-center justify-between" style="padding: 18px;">
              <p class="metric-label" style="margin:0">Entropy</p>
              <span id="ins-entropy" class="metric-value" style="font-size: 16px;">-</span>
            </div>
            <div class="metric-pill flex-row items-center justify-between" style="padding: 18px;">
              <p class="metric-label" style="margin:0">Complexity</p>
              <span id="ins-complexity" class="metric-value" style="font-size: 16px;">-</span>
            </div>
            <div class="metric-pill flex-row items-center justify-between" style="padding: 18px;">
              <p class="metric-label" style="margin:0">Resonance</p>
              <span id="ins-resonance" class="metric-value" style="font-size: 16px;">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="inspector-footer">
       <button id="btn-focus-node" class="action-btn-hd">Focus symbol</button>
    </div>
  </section>

  <!-- Execution Logic -->
  <script src="resonance.js"></script>
  <script src="ui.js"></script>
</body>
</html>
